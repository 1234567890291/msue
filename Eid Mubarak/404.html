
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Responsive 404 Not Found Page</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
	<style>
		body{
  margin:0;
  padding:0;
  height:100vh;
background-image: linear-gradient(to top, #2e1753, #1f1746, #131537, #0d1028, #050819);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
.center {
  align-items: center;
  display: flex;
  justify-content: center;
  height: 100%;
  max-width: 50em;
  margin: 0 auto;
}

.error {
  text-align: center;
}

.error__title {
  background: linear-gradient(#00bcd4, #9575cd,#00bcd4,#9575cd,#00bcd4);
  -webkit-background-clip: text;
          background-clip: text;
  font-family: "Montserrat";
  font-size: 18rem;
  font-weight: 200;
  margin: 0;
  -webkit-text-fill-color: transparent;
}
.error__type {
  color: #fff;
  font-weight: 600;
  font-size: 2.75rem;
  letter-spacing: 0.125em;
  margin: 0;
  text-transform: uppercase;
}
.error__cta {
  color: #fff;
  font-family: "Source Sans Pro";
  font-size: 1.25rem;
  font-weight: 300;
  line-height: 2;
}
.error__link {
  color: #fff;
  padding: 0.25em 0.5em;
  text-decoration: none;
  white-space: nowrap;
}

/*
.error__link--purple {
  background: #9575cd;
}
.error__link--purple:hover {
  background: #00bcd4;
  animation: forwards;
}

.error__link--blue {
  background: #00bcd4;
}
.error__link--blue:hover {
  background: #9575cd;
}
*/
.error__link--b {
  width: 200px;
  height: 100px;
  background: #333333;
  transition: background-color 1s ease-out 100ms;
  border-radius:10px;
  border:solid;
  border-color:#00bcd4;
  transition: all 1.5s ease;
    cursor: pointer;
}

.error__link--b:hover {
  background-color: #676565;
  transform:scale(1.3) ;
  
}
 
 /* .zoom-in-zoom-out {
    animation: zoom-in-zoom-out 2s ease-out infinite;
  }
  
  @keyframes zoom-in-zoom-out {
    0% {
      transform: scale(1, 1);
    }
    50% {
      transform: scale(1.2, 1.2);
    }
    100% {
      transform: scale(1, 1);
    }
  }*/
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:#fff;
  right:0;
  animation:starTwinkle 3s infinite linear;
}

.astronaut img{
  width:100px;
  position:absolute;
  top:55%;
  animation:astronautFly 9s infinite linear;
}

@keyframes astronautFly{
  0%{
    left:-100px;
  }
  25%{
    top:50%;
    transform:rotate(30deg);
  }
  50%{
    transform:rotate(45deg);
    top:55%;
  }
  75%{
    top:60%;
    transform:rotate(30deg);
  }
  100%{
    left:110%;
    transform:rotate(45deg);
  }
}
.emoji img{
  width:20px;
  position:absolute;
  top:0.5%;
  animation:astronautFly 9s infinite linear;
}

@keyframes emojiFly{
  0%{
    left:-100px;
  }
  20%{
    top:20%;
    transform:rotate(20deg);
  }
  30%{
    transform:rotate(65deg);
    top:55%;
  }
  65%{
    top:60%;
    transform:rotate(30deg);
  }
  80%{
    left:110%;
    transform:rotate(45deg);
  }
}

@keyframes starTwinkle{
  0%{
     background:rgba(255,255,255,0.4);
  }
  25%{
    background:rgba(255,255,255,0.8);
  }
  50%{
   background:rgba(255,255,255,1);
  }
  75%{
    background:rgba(255,255,255,0.8);
  }
  100%{
    background:rgba(255,255,255,0.4);
  }
}

@media (max-width: 40em) {
  .error__title {
    font-size: 10rem;
  }
  .error__type {
    font-size: 1.25rem;
  }
  .error__cta {
    font-size: 1rem;
  }
}
	</style>
  </head>
  <body>
  <div class="center">
  <section class="error">
    <h1 class="error__title">404</h1>
    <h2 class="error__type">Page not found</h2>
    <p class="error__cta">We’re sorry, the page you have looked for does not exist in our website or database!
		 or try to use a</p>
		 <a class="error__link error__link--b zoom-in-zoom-out" href="index.html">home page</a>
		
	
  </section>
</div>

<a href="#">
<div class="emoji">
	<img src="error.png" alt="" class="src">
  </div></a>

  <a href="#">
<div class="astronaut">
  <img src="astr.png" alt="" class="src">
</div></a>
  </body>
</html>
